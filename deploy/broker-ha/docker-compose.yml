version: '3.8'

services:
  redis:
    image: redis:7-alpine
    network_mode: host

  haproxy:
    image: haproxy:2.8-alpine
    network_mode: host
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - broker-1
      - broker-2

  broker-1:
    image: alpine:latest
    network_mode: host
    command: ["/app/espx-broker", "-addr", "127.0.0.1:9093", "-health-addr", "127.0.0.1:8081", "-data-dir", "/data", "-node-id", "broker-1", "-redis-url", "redis://127.0.0.1:6379/0"]
    volumes:
      - ../../espx-broker:/app/espx-broker:ro
      - broker-1-data:/data
    depends_on:
      - redis

  broker-2:
    image: alpine:latest
    network_mode: host
    command: ["/app/espx-broker", "-addr", "127.0.0.1:9094", "-health-addr", "127.0.0.1:8082", "-data-dir", "/data", "-node-id", "broker-2", "-redis-url", "redis://127.0.0.1:6379/0"]
    volumes:
      - ../../espx-broker:/app/espx-broker:ro
      - broker-2-data:/data
    depends_on:
      - redis

volumes:
  broker-1-data:
  broker-2-data:
