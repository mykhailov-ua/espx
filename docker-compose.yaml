version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    environment:
      - DB_DSN=${DB_DSN}
      - REDIS_ADDR=${REDIS_ADDR}
      - GOMEMLIMIT=450MiB
      - GOGC=200
    deploy:
      resources:
        limits:
          memory: 512M
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
    sysctls:
      - net.core.somaxconn=8192
      - net.ipv4.tcp_max_syn_backlog=8192
      - net.ipv4.ip_local_port_range=1024 65535
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    tmpfs:
      - /tmp
    networks:
      - frontend
      - backend
      - database
      - monitoring
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${SERVER_PORT}/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  db:
    image: postgres:${POSTGRES_VERSION}
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    # No host port exposure — accessible only within 'database' network.
    ports:
      - "${DB_PORT}:${DB_PORT}"
    command: ["postgres", "-p", "${DB_PORT}"]
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} -p ${DB_PORT}"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}

  redis:
    image: redis:${REDIS_VERSION}
    env_file:
      - .env
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    command: ["redis-server", "--port", "${REDIS_PORT}", "--requirepass", "${REDIS_PASSWORD}"]
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - database
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "${REDIS_PORT}", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}

  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION}
    env_file:
      - .env
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus_rules.yml:/etc/prometheus/prometheus_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.listen-address=:${PROMETHEUS_PORT}'
    # Removed --web.enable-remote-write-receiver to prevent metric injection.
    # No host port exposure — accessible only within 'monitoring' network.
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${PROMETHEUS_PORT}/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION}
    env_file:
      - .env
    environment:
      - GF_SERVER_HTTP_PORT=${GRAFANA_PORT}
      - GF_AUTH_ANONYMOUS_ENABLED=false
    ports:
      - "${GRAFANA_PORT}:${GRAFANA_PORT}"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - monitoring
      - frontend
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${GRAFANA_PORT}/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  k6:
    image: grafana/k6:latest
    networks:
      - monitoring
      - frontend
    volumes:
      - ./load_tests:/scripts
    environment:
      - K6_PROMETHEUS_RW_SERVER_URL=http://prometheus:${PROMETHEUS_PORT}/api/v1/write
      - K6_PROMETHEUS_RW_TREND_STATS=p(95),p(99),min,max,avg
    depends_on:
      prometheus:
        condition: service_healthy

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      - CLICKHOUSE_DB=${CH_DB}
      - CLICKHOUSE_PASSWORD=${CH_PASSWORD}
    # No host port exposure — accessible only within 'database' network.
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./deploy/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - database
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
  database:
    driver: bridge
    internal: false
  monitoring:
    driver: bridge
    internal: true

volumes:
  db_data:
  grafana_data:
  prometheus_data:
  clickhouse_data:
