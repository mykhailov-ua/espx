worker_processes auto;
worker_rlimit_nofile 100000;

events {
    worker_connections 10240;
}

http {
    # Shared dictionary for the edge circuit breaker
    lua_shared_dict circuit_breaker 10m;

    # Import Lua modules
    lua_package_path "/usr/local/openresty/lualib/?.lua;;/etc/nginx/lua/?.lua;";

    upstream trackers {
        server 127.0.0.1:8181;
        server 127.0.0.1:8182;
        server 127.0.0.1:8183;
        server 127.0.0.1:8184;
        keepalive 128;
    }

    server {
        listen 8180;

        location /track {
            # Run the access check script
            access_by_lua_file /etc/nginx/lua/access_check.lua;

            # Blacklists are dynamically checked via Redis in access_check.lua

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_pass http://trackers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
