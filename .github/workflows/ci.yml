name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  all-in-one:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run Lint
        run: make lint

      - name: Run Tests
        run: make test

      - name: Build Docker
        run: make build

  performance-gate:
    name: Performance Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Force CPU Performance Governor
        run: |
          if [ -d /sys/devices/system/cpu/cpu0/cpufreq ]; then
            echo "Forcing CPU governor to performance"
            echo "performance" | sudo tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor || true
          else
            echo "No cpufreq scaling support found. Skipping."
          fi

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Run Benchmark Analysis
        run: |
          echo "Running PR benchmarks..."
          go test -run=^$ -bench=BenchmarkAdsPacketHandler -benchmem -count=10 ./internal/ads > pr_bench.txt

          BASELINE_REF="origin/main"
          if [ "$ACT" = "true" ]; then
            BASELINE_REF="main"
          else
            git fetch origin main
          fi

          BASELINE_SHA=$(git rev-parse "$BASELINE_REF")
          HEAD_SHA=$(git rev-parse HEAD)
          if [ "$BASELINE_SHA" = "$HEAD_SHA" ]; then
            echo "Baseline equals HEAD (direct push to main), copying PR results as baseline."
            cp pr_bench.txt baseline_bench.txt
          else
            cp -r internal/ads/pb internal/ads/pb.pr_backup
            git checkout "$BASELINE_REF" -- internal/ads api/proto/events.proto
            if [ ! -f internal/ads/pb/events_vtproto.pb.go ] && [ -f internal/ads/pb.pr_backup/events_vtproto.pb.go ]; then
              cp internal/ads/pb.pr_backup/events_vtproto.pb.go internal/ads/pb/events_vtproto.pb.go
            fi
            echo "Running baseline benchmarks..."
            go test -run=^$ -bench=BenchmarkAdsPacketHandler -benchmem -count=10 ./internal/ads > baseline_bench.txt
            git checkout HEAD -- internal/ads api/proto/events.proto
            rm -rf internal/ads/pb.pr_backup
          fi

          echo "Executing performance gate..."
          go run scripts/perf_gate.go baseline_bench.txt pr_bench.txt > gate_report.txt
          cat gate_report.txt

      - name: Upload Benchmark Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            pr_bench.txt
            baseline_bench.txt
            gate_report.txt
