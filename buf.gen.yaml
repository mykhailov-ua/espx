version: v1
plugins:
  - plugin: buf.build/protocolbuffers/go
    out: .
    opt:
      - module=github.com/mykhailov-ua/ad-event-processor
  - plugin: buf.build/grpc/go
    out: .
    opt:
      - module=github.com/mykhailov-ua/ad-event-processor
  - name: go-vtproto
    out: .
    opt:
      - module=github.com/mykhailov-ua/ad-event-processor
      - features=marshal+unmarshal+size+pool

