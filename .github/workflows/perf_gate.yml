name: Performance Gate

on:
  push:
    branches: [ main ]
    paths:
      - 'internal/ads/**'
      - 'api/proto/events.proto'
  pull_request:
    branches: [ main ]
    paths:
      - 'internal/ads/**'
      - 'api/proto/events.proto'

jobs:
  performance-gate:
    name: Performance Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Create Baseline Worktree
        run: |
          BASELINE_REF="${{ github.event.pull_request.base.sha || 'main' }}"
          git worktree prune || true
          rm -rf ../baseline || true
          git worktree add --detach ../baseline "$BASELINE_REF"

      - name: Force CPU Performance Governor
        run: |
          if [ -d /sys/devices/system/cpu/cpu0/cpufreq ]; then
            echo "performance" | sudo tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor || true
          fi

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Run PR Benchmarks
        run: |
          go test -run=^$ -bench=BenchmarkAdsPacketHandler -benchmem -count=10 ./internal/ads > "$GITHUB_WORKSPACE/pr_bench.txt"

      - name: Run Baseline Benchmarks
        run: |
          cd ../baseline
          go test -run=^$ -bench=BenchmarkAdsPacketHandler -benchmem -count=10 ./internal/ads > "$GITHUB_WORKSPACE/baseline_bench.txt"

      - name: Execute Performance Gate
        run: |
          go run scripts/perf_gate.go "$GITHUB_WORKSPACE/baseline_bench.txt" "$GITHUB_WORKSPACE/pr_bench.txt" > "$GITHUB_WORKSPACE/gate_report.txt"
          cat "$GITHUB_WORKSPACE/gate_report.txt"

      - name: Upload Benchmark Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            pr_bench.txt
            baseline_bench.txt
            gate_report.txt
